<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pomodoro - The Tracker">
<title>Pomodoro - The Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══ ROOT VARIABLES ══ */
:root {
  --bg:     #07080f;
  --s1:     #0d0e1a;
  --s2:     #12131f;
  --s3:     #1a1b2e;
  --border: #252640;
  --gold:   #f0b429;
  --gold2:  #e07b00;
  --glow:   rgba(240,180,41,0.18);
  --red:    #ff3b55;
  --green:  #00dfa2;
  --blue:   #3d8bff;
  --text:   #dde0f0;
  --muted:  #7b7ea8;
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══ APP SHELL ══ */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ══ HEADER ══ */
.header {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; flex-direction: column; }
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.header-username {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}
.header-username span { color: var(--gold); }
.header-right { text-align: right; }
.header-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.header-date {
  font-size: 10px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ══ TAB CONTENT AREA ══ */
.tab-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.tab-page {
  display: none;
  padding: 14px 14px 20px;
  flex-direction: column;
  gap: 12px;
  min-height: 100%;
}
.tab-page.active { display: flex; }

/* ══ BOTTOM NAV ══ */
.bottom-nav {
  display: flex;
  background: var(--s1);
  border-top: 1px solid var(--border);
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 0.2s;
  -webkit-user-select: none;
  user-select: none;
}
.nav-btn .nav-icon { font-size: 20px; margin-bottom: 3px; line-height: 1; }
.nav-btn.active { color: var(--gold); }

/* ══ CARDS ══ */
.card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 10px;
}

/* ══ TIMER CARD ══ */
.timer-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}

/* Mode pills */
.mode-pills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
.pill {
  background: var(--s3); border: 1.5px solid var(--border); color: var(--muted);
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; padding: 7px 4px;
  border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.2s;
  text-transform: uppercase; line-height: 1.3; -webkit-user-select: none;
}
.pill.active { background: linear-gradient(135deg, var(--gold), var(--gold2)); border-color: var(--gold); color: #000; }

/* Timer ring */
.timer-wrap { position:relative; width:200px; height:200px; }
.ring-svg { width:200px; height:200px; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--s3); stroke-width:10; }
.ring-track {
  fill:none; stroke:var(--gold); stroke-width:10;
  stroke-linecap:round; stroke-dasharray:565; stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear, stroke 0.4s;
  filter:drop-shadow(0 0 8px var(--gold));
}
.ring-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.timer-digits { font-family:'Bebas Neue',sans-serif; font-size:58px; letter-spacing:4px; color:#fff; line-height:1; }
.timer-mode-tag { font-size:10px; font-weight:800; letter-spacing:4px; color:var(--gold); text-transform:uppercase; margin-top:2px; }
.timer-session { font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; font-weight:600; }

/* Controls */
.controls { display:flex; gap:12px; align-items:center; }
.btn-play {
  width:62px; height:62px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none; cursor:pointer; font-size:22px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 24px var(--glow); transition:transform 0.15s;
}
.btn-play:active { transform:scale(0.93); }
.btn-icon {
  width:46px; height:46px; border-radius:50%;
  background:var(--s2); border:1px solid var(--border);
  color:var(--muted); font-size:17px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}

/* WAKEUP PILLS */
.interval-pills { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:4px; }
.int-pill {
  background:var(--s3); border:2px solid var(--border); color:var(--muted);
  font-family:'Syne',sans-serif; font-size:10px; font-weight:700; padding:8px 4px;
  border-radius:10px; cursor:pointer; text-align:center; transition:all 0.2s;
}
.int-pill.active { background:rgba(240,180,41,0.1); border-color:var(--gold); color:var(--gold); }
.int-pill span { display:block; font-size:18px; font-family:'Bebas Neue',sans-serif; }

/* OVERLAYS */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.9);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:500; backdrop-filter:blur(10px); opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.overlay.show { opacity:1; pointer-events:all; }
.popup {
  background:var(--s2); border:1px solid var(--gold);
  border-radius:22px 22px 0 0; padding:28px 22px 36px;
  text-align:center; width:100%; max-width:500px;
  transform:translateY(100%); transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .popup { transform:translateY(0); }

/* ONBOARDING */
#onboardScreen {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; padding:40px 22px; overflow-y:auto;
}
#onboardScreen.hidden { display:none; }
.ob-logo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:6px; background:linear-gradient(90deg,var(--gold),var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
.ob-input { width:100%; background:var(--s2); border:1.5px solid var(--border); color:var(--text); padding:12px; border-radius:12px; margin-bottom:16px; outline:none; }
.ob-start-btn { width:100%; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#000; font-family:'Bebas Neue',sans-serif; font-size:22px; padding:16px; border:none; border-radius:14px; cursor:pointer; }
</style>
</head>
<body>

<div id="onboardScreen">
  <div class="ob-logo">🍅 POMODORO</div>
  <div style="text-align:center; margin-top:40px;">
    <span style="font-size:48px;">👋</span>
    <h2 style="font-family:'Bebas Neue'; letter-spacing:2px; margin:10px 0;">WELCOME CHAMPION</h2>
    <p style="color:var(--muted); font-size:12px; margin-bottom:30px;">Let's get your setup ready.</p>
  </div>
  <label style="font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:8px;">Your Name</label>
  <input class="ob-input" id="obName" placeholder="Enter name...">
  <button class="ob-start-btn" onclick="finishOnboard()">🚀 LET'S START!</button>
</div>

<div class="overlay" id="popupOverlay">
  <div class="popup" id="mainPopup">
    <div style="width:36px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 18px;"></div>
    <span style="font-size:44px;" id="popupEmoji">⏰</span>
    <h2 class="popup-h" id="popupTitle">STAY FOCUSED</h2>
    <p style="font-size:13px; margin-bottom:20px;" id="popupDesc">It's time for a quick check-in!</p>
    <button class="ob-start-btn" onclick="closePopup()">GOT IT!</button>
  </div>
</div>

<div class="app-shell">
  <div class="header">
    <div class="header-left">
      <div class="logo">🍅 POMODORO</div>
      <div class="header-username">Hey, <span id="headerName">Champion</span> 👋</div>
    </div>
    <div class="header-right">
      <div class="header-clock" id="topClock">00:00:00</div>
    </div>
  </div>

  <div class="tab-content">
    <div class="tab-page active">
      <div class="timer-card">
        <div class="mode-pills">
          <div class="pill active" onclick="setMode('focus')">🎯 Focus<br>25m</div>
          <div class="pill" onclick="setMode('short')">☕ Short<br>5m</div>
          <div class="pill" onclick="setMode('long')">🛌 Long<br>15m</div>
          <div class="pill" onclick="setMode('custom')">⚙️ Custom</div>
        </div>
        <div class="timer-wrap" id="timerWrap">
          <svg class="ring-svg" viewBox="0 0 200 200">
            <circle class="ring-bg" cx="100" cy="100" r="90"/>
            <circle class="ring-track" id="ringTrack" cx="100" cy="100" r="90"/>
          </svg>
          <div class="ring-inner">
            <div class="timer-digits" id="timerDigits">25:00</div>
            <div class="timer-mode-tag" id="timerModeTag">FOCUS</div>
            <div class="timer-session" id="timerSessionInfo">Session #1</div>
          </div>
        </div>
        <div class="controls">
          <button class="btn-icon" onclick="resetTimer()">↺</button>
          <button class="btn-play" id="playBtn" onclick="toggleTimer()">▶</button>
          <button class="btn-icon" onclick="skipTimer()">⏭</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🚨 Focus Check-ins</div>
        <div class="interval-pills">
          <div class="int-pill" onclick="setWakeup(5)"><span>5</span>min</div>
          <div class="int-pill active" onclick="setWakeup(10)"><span>10</span>min</div>
          <div class="int-pill" onclick="setWakeup(15)"><span>15</span>min</div>
          <div class="int-pill" onclick="setWakeup(20)"><span>20</span>min</div>
          <div class="int-pill" onclick="setWakeup(0)"><span>OFF</span></div>
        </div>
        <p id="intStatus" style="font-size:10px; color:var(--muted); text-align:center; margin-top:10px; text-transform:uppercase;">Popup every <b>10 mins</b></p>
      </div>
    </div>
  </div>
</div>

<script>
// STATE
let remainSecs = 1500;
let remainAtStart = 1500;
let running = false;
let mode = 'focus';
let wakeupMins = 10;
let sessionNum = 1;
let ticker = null;
let timerStartedAt = null;
let checkinStartedAt = null;

const MODES = {
  focus: { mins: 25, label: 'FOCUS', color: '#f0b429' },
  short: { mins: 5, label: 'BREAK', color: '#00dfa2' },
  long: { mins: 15, label: 'LONG BREAK', color: '#3d8bff' },
  custom: { mins: 45, label: 'CUSTOM', color: '#f0b429' }
};

// UI ELEMENTS
const digits = document.getElementById('timerDigits');
const ring = document.getElementById('ringTrack');
const playBtn = document.getElementById('playBtn');

function updateClock() {
  document.getElementById('topClock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClock, 1000);

function setMode(m) {
  if (running) return;
  mode = m;
  remainSecs = MODES[m].mins * 60;
  remainAtStart = remainSecs;
  document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', ['focus','short','long','custom'][i] === m));
  document.getElementById('timerModeTag').textContent = MODES[m].label;
  document.getElementById('ringTrack').style.stroke = MODES[m].color;
  updateUI();
}

function setWakeup(m) {
  wakeupMins = m;
  document.querySelectorAll('.int-pill').forEach((p, i) => p.classList.toggle('active', [5,10,15,20,0][i] === m));
  document.getElementById('intStatus').innerHTML = m === 0 ? "Check-ins <b>OFF</b>" : `Popup every <b>${m} mins</b>`;
  if (running) checkinStartedAt = Date.now();
}

function updateUI() {
  const m = Math.floor(remainSecs / 60);
  const s = remainSecs % 60;
  digits.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  const offset = 565 - (565 * remainSecs / remainAtStart);
  ring.style.strokeDashoffset = offset;
}

function toggleTimer() {
  if (running) {
    clearInterval(ticker);
    running = false;
    playBtn.textContent = '▶';
  } else {
    running = true;
    playBtn.textContent = '⏸';
    timerStartedAt = Date.now();
    checkinStartedAt = Date.now();
    const startRemain = remainSecs;
    
    ticker = setInterval(() => {
      const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
      remainSecs = Math.max(0, startRemain - elapsed);
      
      if (remainSecs <= 0) {
        clearInterval(ticker);
        onComplete();
      }

      // Check-in Logic
      if (mode === 'focus' && wakeupMins > 0) {
        const sinceCheckin = (Date.now() - checkinStartedAt) / 1000 / 60;
        if (sinceCheckin >= wakeupMins) {
          showPopup("STAY FOCUSED", "Don't get distracted! Keep pushing.", "🔥");
          checkinStartedAt = Date.now();
        }
      }
      updateUI();
    }, 1000);
  }
}

function onComplete() {
  running = false;
  playBtn.textContent = '▶';
  showPopup("SESSION DONE", mode === 'focus' ? "Great work! Time for a break." : "Break over! Let's get back to it.", "🎉");
  if (mode === 'focus') {
    sessionNum++;
    document.getElementById('timerSessionInfo').textContent = `Session #${sessionNum}`;
  }
}

function resetTimer() {
  clearInterval(ticker);
  running = false;
  playBtn.textContent = '▶';
  remainSecs = MODES[mode].mins * 60;
  remainAtStart = remainSecs;
  updateUI();
}

function skipTimer() {
  onComplete();
}

function showPopup(h, sub, emoji) {
  document.getElementById('popupTitle').textContent = h;
  document.getElementById('popupDesc').textContent = sub;
  document.getElementById('popupEmoji').textContent = emoji;
  document.getElementById('popupOverlay').classList.add('show');
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
}

function finishOnboard() {
  const name = document.getElementById('obName').value || "Champion";
  document.getElementById('headerName').textContent = name;
  document.getElementById('onboardScreen').classList.add('hidden');
  localStorage.setItem('pomo_name', name);
}

// Load Name
window.onload = () => {
  const saved = localStorage.getItem('pomo_name');
  if (saved) {
    document.getElementById('headerName').textContent = saved;
    document.getElementById('onboardScreen').classList.add('hidden');
  }
  updateUI();
};
</script>
</body>
</html>
